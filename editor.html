<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dandle - Level Editor</title>
  <link rel="stylesheet" href="css/editor.css?v=5.9.18">
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
  <div id="toolbar">
    <div class="tool-group">
      <span class="toolbar-label">DANDLE EDITOR</span>
    </div>
    <div class="tool-group">
      <button class="tool-btn active" data-tool="select" title="Select (V)">Select</button>
      <button class="tool-btn" data-tool="floor" title="Paint Floor (F)">Floor</button>
      <button class="tool-btn" data-tool="erase" title="Erase (X)">Erase</button>
      <button class="tool-btn" data-tool="endzone" title="Place End Zone (E)">End Zone</button>
      <button class="tool-btn" data-tool="wall" title="Place Wall (W)">Wall</button>
      <button class="tool-btn" data-tool="letterzone" title="Place Letter Zone (L)">Letter Zone</button>
      <button class="tool-btn" data-tool="sticky" title="Place Sticky Block (S)">Sticky</button>
      <button class="tool-btn" data-tool="ice" title="Place Ice Block (I)">Ice</button>
      <button class="tool-btn" data-tool="ramp" title="Place Ramp (R)">Ramp</button>
      <button class="tool-btn" data-tool="impulse" title="Place Impulse Block (G)">Impulse</button>
      <button class="tool-btn" data-tool="moving" title="Place Moving Block (M)">Moving</button>
      <button class="tool-btn" data-tool="destructible" title="Place Destructible (D)">Breakable</button>
      <button class="tool-btn" data-tool="spawner" title="Place Spawner (P)">Spawner</button>
      <button class="tool-btn" data-tool="powerup" title="Place Power-Up (U)">Power-Up</button>
      <button class="tool-btn" data-tool="zipline" title="Place Zip Line (Z)">Zip Line</button>
    </div>
    <div class="tool-group">
      <button id="btn-playtest" title="Test this level in-game">Play Test</button>
      <button id="btn-export">Export JSON</button>
      <button id="btn-import">Import JSON</button>
      <button id="btn-clear">Clear All</button>
    </div>
  </div>

  <div id="main">
    <canvas id="editor-canvas"></canvas>
    <div id="panel">
      <div id="panel-level">
        <h3>Level</h3>
        <label>Name <input type="text" id="prop-name" value="My Level" /></label>
        <label>Hint <input type="text" id="prop-hint" value="Reach the red zone!" /></label>
        <label>Start Y <input type="number" id="prop-starty" value="0" step="1" /></label>
        <label>Floor Y <input type="number" id="prop-floory" value="0" step="1" title="Y level for painting blocks" /></label>
      </div>
      <hr />
      <div id="panel-paint">
        <h3>Paint Settings</h3>
        <label>LZ Type
          <select id="prop-lztype">
            <option value="-">- (Remove)</option>
            <option value="+">+ (Add)</option>
          </select>
        </label>
        <label>LZ Letter <input type="text" id="prop-lzletter" value="random" title="Letter or 'random'" /></label>
        <label>Ramp Slope
          <select id="prop-rampslope">
            <option value="1:1">1:1 (45 deg)</option>
            <option value="2:1">2:1 (gentle)</option>
          </select>
        </label>
        <label>Direction
          <select id="prop-direction">
            <option value="+x">+X (East)</option>
            <option value="-x">-X (West)</option>
            <option value="+z">+Z (South)</option>
            <option value="-z">-Z (North)</option>
            <option value="+y">+Y (Up)</option>
            <option value="-y">-Y (Down)</option>
          </select>
        </label>
        <label>Spawner Type
          <select id="prop-spawnertype">
            <option value="ball">Ball</option>
            <option value="cube">Cube</option>
            <option value="boulder">Boulder</option>
            <option value="cylinder">Cylinder</option>
            <option value="cone">Cone</option>
          </select>
        </label>
      </div>
      <hr />
      <div id="panel-object">
        <h3 id="panel-obj-title">No Selection</h3>
        <div id="panel-obj-fields"></div>
      </div>
      <hr />
      <div id="panel-help">
        <h3>Controls</h3>
        <div class="help-row">Left-click: Place/select</div>
        <div class="help-row">Left-drag: Paint blocks</div>
        <div class="help-row">Del: Delete selected</div>
        <div class="help-row" style="margin-top:6px"><b>Camera (hold right-click):</b></div>
        <div class="help-row">Mouse: Look around</div>
        <div class="help-row">WASD: Fly forward/strafe</div>
        <div class="help-row">Q/E: Fly down/up</div>
        <div class="help-row">Scroll: Dolly in/out</div>
      </div>
      <hr />
      <div id="panel-templates">
        <h3>Templates</h3>
        <div id="template-btns"></div>
      </div>
    </div>
  </div>

  <div id="modal" class="hidden">
    <div id="modal-inner">
      <h3 id="modal-title">JSON</h3>
      <textarea id="modal-text"></textarea>
      <div id="modal-actions">
        <button id="modal-ok">OK</button>
        <button id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/editor.js?v=5.9.21"></script>
</body>
</html>
